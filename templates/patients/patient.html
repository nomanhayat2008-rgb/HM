{% extends 'base.html' %}

{% block header %}
<title></title>
{% endblock %}

{% block body %}
<h2 class="font-big">{{ patient.username }} {{ patient.id }}</h2>

<ul>
    <li>
        <iframe class="pdf"
                src="{{ url_for('static', filename='uploads/' ~ (patient.ePname ~ '_' ~ patient.eFname ~ '.docx')|replace('.docx', '.pdf')) }}"
                target="_blank">
        </iframe>
    </li>

</ul>
{% endblock %}
